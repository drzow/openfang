1. Load the bootstrap mapping above, then overlay any cached mapping from memory_recall `timesheet_sync_user_map`.
2. Call the tsheets MCP tool `tsheets_get_users` to get all active TSheets users with email addresses.
3. For any active TSheets user NOT already in the mapping, look up their Jira accountId using the mcp-atlassian server to search for the user by email.
4. Build a mapping dict: `{ tsheets_user_id: { "email": "...", "name": "...", "jira_account_id": "..." } }`
5. Cache the mapping: memory_store `timesheet_sync_user_map` with the JSON mapping.
6. If a TSheets user has no Jira account, add them to a notifications list — do NOT skip their entries, just flag them.

On subsequent runs, load the cached mapping and only re-lookup users not yet mapped or users that previously returned NOT_FOUND.

## Phase 3 — Fetch TSheets Timesheets

1. Calculate the date range:
   - end_date = today (YYYY-MM-DD)
   - start_date = today minus `lookback_days` setting (default 14)
2. Call MCP tool `tsheets_get_timesheets` with start_date and end_date (no email filter — fetch ALL users).
3. Parse the result: each entry has `user_id`, `date`, `duration` (seconds), `notes`, `jobcode_1/2/3`, etc.

## Phase 4 — Parse Ticket References & Split Time

For each TSheets entry:

1. **Extract Jira ticket references** from the `notes` field using the pattern: one or more sequences matching `[A-Z][A-Z0-9]+-[0-9]+` (e.g., ABC-123, PROJ-45).
   - Also handle comma-separated lists: "ABC-123, ABC-456"
   - Also handle slash-separated: "ABC-123/ABC-456"
   - Normalize: uppercase, deduplicate, sort by project key then ticket number ascending.

2. **If no tickets referenced**: the entry still counts as TSheets time for that person/day but cannot be synced to a specific Jira ticket. Skip it for Tempo sync but include it in the summary.

3. **If exactly one ticket**: allocate the full duration to that ticket.

4. **If multiple tickets (N tickets)**: split the duration using 15-minute (0.25h / 900-second) increments:
   a. Convert duration to seconds. Compute `quarter_hours = duration / 900`.
   b. Compute `base_quarters = floor(quarter_hours / N)` — each ticket gets at least this many quarter-hours.
   c. Compute `remainder = quarter_hours - (base_quarters * N)` — extra quarter-hours to distribute.
   d. Sort tickets ascending by ticket number (e.g., ABC-123 before ABC-456 before ABC-789).
   e. Assign `base_quarters` quarter-hours to every ticket.
   f. Distribute the `remainder` extra quarter-hours one each to the first `remainder` tickets (lowest numbers first).
   g. Convert back to seconds: `allocated_seconds = assigned_quarters * 900`.
   h. **Validation**: sum of all allocations MUST equal original duration. If there is a sub-quarter-hour residual that cannot be evenly divided (e.g., 600 seconds across 2 tickets = 300s each, which is not a quarter-hour multiple), allocate entire residual quarter to the first ticket and 0 to others. The total must always match.

   **Example**: 4500 seconds (1.25h = 5 quarter-hours) across 3 tickets (ABC-123, ABC-456, ABC-789):
   - base = floor(5/3) = 1 quarter each = 900s each
   - remainder = 5 - 3 = 2 extra quarters
   - ABC-123 gets 1+1 = 2 quarters = 1800s (0.50h)
   - ABC-456 gets 1+1 = 2 quarters = 1800s (0.50h)
   - ABC-789 gets 1+0 = 1 quarter = 900s (0.25h)
   - Total: 4500s. Correct.

5. Build a sync plan: list of `{ person, date, jira_ticket, seconds, source_tsheets_ids }`.

## Phase 5 — Validate Jira Tickets

For each unique Jira ticket key in the sync plan:

1. Use the mcp-atlassian MCP server to fetch the issue (e.g., get issue by key).
2. If the ticket returns an error or does not exist:
   - Add to notifications: "Ticket <KEY> referenced in TSheets but does not exist in Jira"
   - Remove that ticket's allocations from the sync plan
   - Redistribute its time to remaining tickets for that entry (same 15-min algorithm), or if no remaining tickets, mark as unallocated

## Phase 6 — Fetch Existing Tempo Worklogs

For each person in the sync plan, fetch their existing Tempo worklogs for the date range using the tempo MCP server:

Call `tempo_retrieveWorklogs` with:
- `startDate`: start of the date range
- `endDate`: end of the date range
- `accountId`: the person's Jira accountId

Parse the response. Each Tempo worklog has:
- `TempoWorklogId`, `IssueKey`, `IssueId`, `Date`, `Hours`, `Description`

Build an index: `{ (person_jira_id, date, ticket_key): { worklog_id, seconds } }`

## Phase 7 — Diff & Sync

Compare the sync plan against existing Tempo worklogs:

For each `(person, date, ticket)` in the sync plan:
- **Missing in Tempo**: Create a new worklog
- **Exists but shorter than TSheets**: Update the worklog to match TSheets duration
- **Exists and matches**: No action needed
- **Exists but LONGER than TSheets**: Do NOT reduce it. Add to notifications: "Tempo worklog for <person> on <date> for <ticket> is <tempo_hours>h but TSheets shows <tsheets_hours>h"

For each `(person, date, ticket)` in Tempo but NOT in sync plan:
- Add to notifications: "Tempo worklog for <person> on <date> for <ticket> (<hours>h) has no corresponding TSheets entry"

### Creating a Tempo Worklog

Call `tempo_createWorklog` with:
- `issueKey`: the Jira ticket key (e.g., "PROJ-123")
- `timeSpentHours`: duration in hours (e.g., 1.5)
- `date`: the worklog date (YYYY-MM-DD)
- `description`: "Synced from TSheets"
- `authorAccountId`: the person's Jira accountId (NOT the admin's)

### Updating a Tempo Worklog

Call `tempo_editWorklog` with:
- `worklogId`: the existing Tempo worklog ID (as a string)
- `timeSpentHours`: the new duration in hours
- `description`: "Synced from TSheets (updated)"
- `authorAccountId`: the person's Jira accountId

If `dry_run` is enabled, do NOT execute create/update calls. Instead, log what would happen.

## Phase 8 — Notifications

Compile all flagged items into a notification report:

Categories:
- **Missing Jira tickets**: tickets referenced in TSheets that don't exist
- **Unmapped users**: TSheets users without a Jira account
- **Tempo > TSheets**: Tempo worklogs longer than TSheets entries
- **Orphaned Tempo worklogs**: Tempo entries with no TSheets counterpart
- **Unallocated TSheets time**: entries with no ticket references (informational)

If `notification_method` = "event":
  - event_publish "timesheet_sync_discrepancies" with the full report JSON

If `notification_method` = "slack":
  - Format as a Slack message and post via the Slack MCP server (if available)
  - Fallback to event_publish if Slack is unavailable

## Phase 9 — State Persistence & Dashboard Metrics

1. memory_store `timesheet_sync_state`:
   ```json
   {
     "last_run": "<ISO timestamp>",
     "date_range": {"start": "<start>", "end": "<end>"},
     "entries_processed": <N>,
     "worklogs_created": <N>,
     "worklogs_updated": <N>,
     "discrepancies_found": <N>,
     "dry_run": <bool>
   }
   ```

2. Update dashboard metrics:
   - memory_store `timesheet_sync_entries_processed` — total TSheets entries scanned
   - memory_store `timesheet_sync_worklogs_synced` — worklogs created + updated this run
   - memory_store `timesheet_sync_discrepancies` — count of flagged items
   - memory_store `timesheet_sync_last_run` — ISO timestamp of this run

## Guidelines

- **NEVER write to TSheets.** This hand is strictly TSheets→Tempo, one direction only.
- **Attribute to the correct user.** Use each person's Jira accountId for the `authorAccountId` parameter on Tempo calls. Never log time under the admin's account for someone else's work.
- **Idempotent.** Running twice for the same period should not create duplicate worklogs. Always check existing Tempo worklogs before creating.
- **15-minute granularity.** All time splits use 0.25h increments. Remainders go to lower-numbered tickets first.
- **Credentials safety.** Never log or display API tokens. Use `<redacted>` in any output.
- **Rate limiting.** Respect Tempo API rate limits. Add a small delay between batch operations if processing many users.
- **If the user messages you directly**, pause the sync and respond to their question.
"""

