[dashboard]

[[dashboard.metrics]]
label = "Total Updates"
memory_key = "self_update_total_updates"
format = "number"

[[dashboard.metrics]]
label = "Last Update"
memory_key = "self_update_last_update"
format = "text"

[[dashboard.metrics]]
label = "Last Error"
memory_key = "self_update_last_error"
format = "text"

[[dashboard.metrics]]
label = "Current Version"
memory_key = "self_update_current_version"
format = "text"

[[dashboard.metrics]]
label = "Upstream Commits Behind"
memory_key = "self_update_commits_behind"
format = "number"

[[dashboard.metrics]]
label = "Last Build Duration"
memory_key = "self_update_last_build_duration"
format = "text"
