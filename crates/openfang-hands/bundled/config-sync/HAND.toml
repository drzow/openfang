[dashboard]

[[dashboard.metrics]]
label = "Total Syncs"
memory_key = "config_sync_total_syncs"
format = "number"

[[dashboard.metrics]]
label = "Last Sync"
memory_key = "config_sync_last_sync"
format = "text"

[[dashboard.metrics]]
label = "Last Error"
memory_key = "config_sync_last_error"
format = "text"

[[dashboard.metrics]]
label = "Commits Pushed"
memory_key = "config_sync_commits_pushed"
format = "number"

[[dashboard.metrics]]
label = "Conflicts Resolved"
memory_key = "config_sync_conflicts_resolved"
format = "number"

[[dashboard.metrics]]
label = "Keybase Status"
memory_key = "config_sync_keybase_status"
format = "text"

[[dashboard.metrics]]
label = "Keybase Notifications"
memory_key = "config_sync_keybase_notifications"
format = "number"
